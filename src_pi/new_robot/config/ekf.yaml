frequency: 30
sensor_timeout: 0.1

# Publish fused odom
publish_tf: true
map_frame: map              
odom_frame: odom            
base_link_frame: base_footprint  
world_frame: odom           

two_d_mode: true

# Odometry from encoders
odom0: /odom_data_quat
odom0_config: [true, true, false,
               false, false, true,
               true, false, false,
               false, false, true,
               false, false, false]
odom0_differential: false
odom0_relative: false

# IMU
imu0: /imu/data
imu0_config: [false, false, false,
              true, true, true,
              false, false, false,
              false, false, true,
              true, true, false]
imu0_differential: true
imu0_relative: false
imu0_remove_gravitational_acceleration: true
